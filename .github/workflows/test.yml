name: Tests

# BILLING NOTE: Full test matrix only runs on version tags (v*) to conserve
# GitHub Actions minutes. Regular pushes/PRs only run the lint job.
# macOS runners cost 10x, Windows 2x — a 3-OS x 2-toolchain matrix burns
# through included minutes fast.

on:
  push:
    branches: [ main, master, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        toolchain: [stable, '1.75']

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust ${{ matrix.toolchain }}
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.toolchain }}

    - name: Cache cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ matrix.os }}-cargo-${{ matrix.toolchain }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ matrix.os }}-cargo-${{ matrix.toolchain }}-

    - name: Run all tests
      run: cargo test --all-features --verbose
      env:
        CI: true

    - name: Upload test results artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.toolchain }}
        path: |
          target/debug/deps/*.xml
        retention-days: 7

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust stable with components
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Cache cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ubuntu-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ubuntu-cargo-lint-

    - name: Check formatting with rustfmt
      run: cargo fmt --check
      continue-on-error: true

    - name: Lint with Clippy
      run: cargo clippy -- -D warnings
      continue-on-error: true

    - name: Compile check
      run: cargo check
      continue-on-error: true
